name: yucca_agro_app
description: "Mobile application for Yucca Consulting Limited."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8

  # HTTP for API calls to Flask backend
  http: ^1.1.0

  # Image picker for soil scanner
  image_picker: ^1.0.4
  

  # Environment variables (for API base URL)
  flutter_dotenv: ^5.1.0

  # Local storage for simple data (auth, preferences)
  shared_preferences: ^2.1.1

  # State management (for auth, weather, tips)
  provider: ^6.1.1

  # Secure storage for JWT tokens (login sessions)
  flutter_secure_storage: ^9.0.0

  # Location services (for weather forecast)
  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  # UI Utilities
  intl: ^0.18.1
  cached_network_image: ^3.3.0

  # 🔗 URL Launcher - for opening yuccaconsult.com in browser
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/foods.png
    - assets/splash1.png
    - assets/yucca.png
    - assets/Splash2.png
    - assets/yucca1.png
    - assets/goats.jpg
    - assets/cattle.jpg
    - assets/poultry.jpg
    - assets/anthrax.jpg
    - assets/brucellosis.jpg
    - assets/fmd.jpg
    - assets/newcastle.jpg
    - .env